spring.application.name=back_streaming
server.port=8090
server.http2.enabled=true

# Variables de entorno para tests
variable.FRONT=http://localhost:3000
variable.RTMP=rtmp://localhost:1935/live
variable.RTMP_DOCKER=rtmp://rtmp:1935/live
variable.VIDEOS_DIR=/tmp/videos

# Conexion a H2 para tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA properties para tests
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# MongoDB embedded para tests
spring.mongodb.embedded.version=5.0.5

# Configuración de SSL (deshabilitada para tests)
# server.ssl.key-store=/certs/keystore.p12
# server.ssl.key-store-password=${SSL_PASSWORD}
# server.ssl.key-store-type=${SSL_TYPE}
# server.ssl.key-alias=${SSL_ALIAS}

security.jwt.private.key=test-key
security.jwt.user.generator=AUTH0-JWT

# Logging reducido para tests
logging.level.org.springframework.web=WARN